<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>好酪 Hello Panna - 職人出餐模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #2b2b2b; 
            font-family: '微軟正黑體', sans-serif; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        canvas { display: block; margin: 0 auto; }
        #fullscreen-btn {
            position: absolute; top: 15px; right: 15px; padding: 10px 15px;
            background-color: #FF9800; color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #fullscreen-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<button id="fullscreen-btn" onclick="toggleFullScreen()">📱 進入全螢幕</button>

<script>
function toggleFullScreen() {
    let doc = window.document; let docEl = doc.documentElement;
    let requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
    let cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
    if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
        requestFullScreen.call(docEl).catch(err => alert(`無法進入全螢幕: ${err.message}`));
        document.getElementById('fullscreen-btn').innerText = '退出全螢幕';
    } else {
        cancelFullScreen.call(doc);
        document.getElementById('fullscreen-btn').innerText = '📱 進入全螢幕';
    }
}

const config = {
    type: Phaser.AUTO, width: 1100, height: 650, backgroundColor: '#37474F',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, dog, obstacles;
let cursors, spacebar;
let score = 0;

// === 職人奶酪狀態管理 ===
// 狀態階段：0:空, 1:原料, 2:熱奶酪液, 3:未加蓋杯, 4:冰鎮未加蓋, 5:加蓋成品
let heldState = 0; 
let heldFlavor = null;
let fridgeTimer = 0;
let fridgeState = 'empty'; // empty, cooling, ready
let fridgeFlavor = null;

let currentOrder = null;
let customerNPC, timerBarBg, timerBarFill, orderBubble;
let customerTimer = 0;
const CUSTOMER_MAX_TIME = 40000; // 流程變長，客人耐心增加到 40 秒
let isCustomerActive = false;

// 觸控變數
let actionButton, isJoyStickActive = false, joystickBase, joystickStick;
let joyVector = new Phaser.Math.Vector2(0, 0);

const MENU = [
    { id: 'original', name: '經典原味', price: 50 }, { id: 'chocolate', name: '巧克力', price: 55 },
    { id: 'matcha', name: '抹茶', price: 55 }, { id: 'sesame', name: '芝麻', price: 55 },
    { id: 'earl_grey', name: '伯爵紅茶', price: 55 }, { id: 'thai_tea', name: '泰式奶茶', price: 55 },
    { id: 'taro', name: '芋香紫薯', price: 55 }, { id: 'jasmine', name: '十薰茉莉綠', price: 55 },
    { id: 'tipsy', name: '微醺', price: 55 }, { id: 'coffee', name: '咖啡', price: 55 }
];

function preload() {}

function create() {
    this.physics.world.setBounds(200, 0, 700, 650); 
    
    // 背景與地板
    const graphics = this.add.graphics();
    graphics.fillStyle(0xFAF0E6, 1); graphics.fillRect(200, 0, 700, 650);
    graphics.lineStyle(2, 0xE0D4C8, 1);
    for(let i=200; i<900; i+=50) { graphics.moveTo(i, 0); graphics.lineTo(i, 650); }
    for(let i=0; i<650; i+=50) { graphics.moveTo(200, i); graphics.lineTo(900, i); }
    graphics.strokePath();

    this.add.rectangle(100, 325, 200, 650, 0x263238);
    this.add.rectangle(1000, 325, 200, 650, 0x263238);

    // === 建立靜態障礙物 (隔間牆) ===
    obstacles = this.physics.add.staticGroup();
    // 隔間牆從上方延伸下來，下方留走道讓玩家通往櫃台
    let wall = this.add.rectangle(720, 225, 20, 450, 0x90A4AE);
    obstacles.add(this.physics.add.existing(wall, true));

    // === 左至右工作站配置 ===
    this.stations = {
        prep: this.add.rectangle(280, 520, 140, 100, 0xC8E6C9).setInteractive(),   // 備料區(左下)
        stove: this.add.rectangle(280, 200, 140, 140, 0xFFCCBC).setInteractive(),  // 烹調區(左上)
        worktable: this.add.rectangle(480, 350, 140, 250, 0xB0BEC5).setInteractive(),// 工作臺(中)
        fridge: this.add.rectangle(630, 250, 120, 150, 0xE1BEE7).setInteractive(), // 冰箱區(中右)
        counter: this.add.rectangle(830, 350, 100, 450, 0xFFE082).setInteractive() // 櫃台區(最右)
    };
    // 為了物理碰撞，把工作臺也加入障礙物
    obstacles.add(this.physics.add.existing(this.stations.worktable, true));

    // 站點文字標籤
    this.add.text(230, 490, '📦 備料區\n(拿取食材)', { fontSize: '18px', fill: '#2E7D32', fontStyle: 'bold', align: 'center' });
    this.add.text(230, 180, '🔥 烹調區\n(熬煮奶酪液)', { fontSize: '18px', fill: '#D84315', fontStyle: 'bold', align: 'center' });
    this.add.text(435, 330, '🗄️ 工作臺\n(裝杯/加蓋)', { fontSize: '18px', fill: '#37474F', fontStyle: 'bold', align: 'center' });
    this.fridgeText = this.add.text(585, 230, '❄️ 冰箱區', { fontSize: '18px', fill: '#6A1B9A', fontStyle: 'bold', align: 'center' });
    this.add.text(795, 330, '🛎️ 櫃台\n(裝盒結帳)', { fontSize: '20px', fill: '#E65100', fontStyle: 'bold', align: 'center' });

    // === NPC 客人 ===
    customerNPC = this.add.text(830, 60, '🧍', { fontSize: '50px' }).setOrigin(0.5).setVisible(false);
    orderBubble = this.add.text(830, 0, '', { fontSize: '18px', fill: '#000', backgroundColor: '#FFF', padding: {x:8, y:4} }).setOrigin(0.5).setVisible(false);
    timerBarBg = this.add.rectangle(830, 25, 80, 8, 0x000000).setOrigin(0.5).setVisible(false);
    timerBarFill = this.add.rectangle(790, 21, 80, 8, 0x4CAF50).setOrigin(0, 0).setVisible(false);

    // === 玩家與狗狗 ===
    player = this.add.text(380, 450, '👩‍🍳', { fontSize: '45px' }).setOrigin(0.5);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    player.body.setSize(35, 35); 
    this.tweens.add({ targets: player, scaleY: 1.1, duration: 500, yoyo: true, repeat: -1 });

    dog = this.add.text(350, 250, '🐶', { fontSize: '35px' }).setOrigin(0.5);
    this.physics.add.existing(dog);
    dog.body.setCollideWorldBounds(true);
    dog.body.setVelocity(200, 200); 
    dog.body.setBounce(1, 1);
    this.tweens.add({ targets: dog, angle: 10, duration: 200, yoyo: true, repeat: -1 });

    this.physics.add.collider(player, obstacles);
    this.physics.add.collider(dog, obstacles);
    this.physics.add.overlap(player, dog, handleDogCollision, null, this);

    // === UI 面板 ===
    this.add.rectangle(550, 30, 700, 60, 0x3E2723, 0.9);
    this.scoreText = this.add.text(220, 15, '💰 營業額: $0', { fontSize: '22px', fill: '#FFF' });
    this.heldText = this.add.text(450, 15, '🤲 狀態: 雙手空空', { fontSize: '22px', fill: '#FFD54F' });

    createMobileUI.call(this);
    cursors = this.input.keyboard.createCursorKeys();
    spacebar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    generateOrder.call(this);
}

function createMobileUI() {
    actionButton = this.add.circle(1000, 500, 70, 0xFF5722, 0.9).setInteractive();
    this.add.text(965, 485, '動作', { fontSize: '32px', fill: '#FFF', fontStyle: 'bold' });
    actionButton.on('pointerdown', () => { actionButton.setAlpha(0.6); interactWithStation.call(this); });
    actionButton.on('pointerup', () => actionButton.setAlpha(0.9));
    actionButton.on('pointerout', () => actionButton.setAlpha(0.9));

    joystickBase = this.add.circle(100, 500, 80, 0x90A4AE, 0.3).setVisible(false);
    joystickStick = this.add.circle(100, 500, 40, 0xCFD8DC, 0.7).setVisible(false);

    this.input.on('pointerdown', function (pointer) {
        if (pointer.x < 200) { 
            isJoyStickActive = true; joystickBase.setPosition(pointer.x, pointer.y).setVisible(true);
            joystickStick.setPosition(pointer.x, pointer.y).setVisible(true);
        }
    }, this);

    this.input.on('pointermove', function (pointer) {
        if (isJoyStickActive && pointer.isDown && pointer.x < 300) {
            let dx = pointer.x - joystickBase.x; let dy = pointer.y - joystickBase.y;
            let angle = Math.atan2(dy, dx); let distance = Math.min(80, Math.sqrt(dx * dx + dy * dy));
            joystickStick.setPosition(joystickBase.x + Math.cos(angle) * distance, joystickBase.y + Math.sin(angle) * distance);
            joyVector.set(Math.cos(angle), Math.sin(angle));
            if (distance < 10) joyVector.set(0, 0);
        }
    }, this);

    this.input.on('pointerup', function () {
        isJoyStickActive = false; joystickBase.setVisible(false); joystickStick.setVisible(false); joyVector.set(0, 0);
    }, this);
}

function update(time, delta) {
    player.body.setVelocity(0);
    const speed = 250; 
    
    if (isJoyStickActive && (joyVector.x !== 0 || joyVector.y !== 0)) {
        player.body.setVelocityX(joyVector.x * speed); player.body.setVelocityY(joyVector.y * speed);
    } else {
        if (cursors.left.isDown) player.body.setVelocityX(-speed); else if (cursors.right.isDown) player.body.setVelocityX(speed);
        if (cursors.up.isDown) player.body.setVelocityY(-speed); else if (cursors.down.isDown) player.body.setVelocityY(speed);
    }

    if (Phaser.Input.Keyboard.JustDown(spacebar)) interactWithStation.call(this);

    if (fridgeState === 'cooling') {
        fridgeTimer -= delta;
        this.fridgeText.setText(`❄️ 冰箱區\n(冷藏中...${Math.ceil(fridgeTimer/1000)}s)`);
        if (fridgeTimer <= 0) {
            fridgeState = 'ready';
            this.fridgeText.setText('✨ 冰箱區\n(凝固完成!)');
            this.fridgeText.setColor('#D50000');
        }
    }

    if (isCustomerActive) {
        customerTimer -= delta;
        let progress = customerTimer / CUSTOMER_MAX_TIME;
        timerBarFill.width = 80 * progress;
        if (progress > 0.5) timerBarFill.fillColor = 0x4CAF50; 
        else if (progress > 0.2) timerBarFill.fillColor = 0xFFEB3B; 
        else timerBarFill.fillColor = 0xF44336; 

        if (customerTimer <= 0) {
            isCustomerActive = false; customerNPC.setText('💢');
            showFloatText.call(this, customerNPC.x, customerNPC.y - 30, '等太久了！', '#F44336');
            this.time.delayedCall(1500, generateOrder, [], this);
        }
    }
}

// 核心互動邏輯 (6階段狀態機)
function interactWithStation() {
    const px = player.x; const py = player.y; const dist = 110; 

    // 1. 食材備料區
    if (Phaser.Math.Distance.Between(px, py, this.stations.prep.x, this.stations.prep.y) < dist) {
        if (heldState === 0 && currentOrder) {
            heldState = 1; heldFlavor = currentOrder;
            updateHeldUI(`原料 (${heldFlavor.name})`);
            showFloatText.call(this, px, py - 30, '拿取牛奶、鮮奶油與材料', '#4CAF50');
        }
    }
    // 2. 烹調區
    else if (Phaser.Math.Distance.Between(px, py, this.stations.stove.x, this.stations.stove.y) < dist) {
        if (heldState === 1) {
            heldState = 2;
            updateHeldUI(`熱奶酪液 (${heldFlavor.name})`);
            showFloatText.call(this, px, py - 30, '🔥 熬煮完成', '#FF5722');
        }
    }
    // 3. 工作臺區 (負責裝杯 與 加蓋)
    else if (Phaser.Math.Distance.Between(px, py, this.stations.worktable.x, this.stations.worktable.y) < dist + 30) {
        if (heldState === 2) {
            // 裝杯動作
            heldState = 3;
            updateHeldUI(`裝杯未加蓋 (${heldFlavor.name})`);
            showFloatText.call(this, px, py - 30, '🥛 倒入杯中', '#2196F3');
        } else if (heldState === 4) {
            // 加蓋動作
            heldState = 5;
            updateHeldUI(`加蓋成品 (${heldFlavor.name})`);
            showFloatText.call(this, px, py - 30, '👌 蓋上蓋子', '#4CAF50');
        }
    }
    // 4. 冰箱區
    else if (Phaser.Math.Distance.Between(px, py, this.stations.fridge.x, this.stations.fridge.y) < dist) {
        if (heldState === 3 && fridgeState === 'empty') {
            // 放入冰箱
            heldState = 0; fridgeFlavor = heldFlavor; heldFlavor = null;
            updateHeldUI('雙手空空');
            fridgeState = 'cooling'; fridgeTimer = 3000;
            this.fridgeText.setColor('#000000');
            showFloatText.call(this, px, py - 30, '❄️ 放入冷藏', '#9C27B0');
        } else if (heldState === 0 && fridgeState === 'ready') {
            // 從冰箱拿出
            heldState = 4; heldFlavor = fridgeFlavor;
            updateHeldUI(`冰鎮未加蓋 (${heldFlavor.name})`);
            fridgeState = 'empty'; fridgeFlavor = null;
            this.fridgeText.setText('❄️ 冰箱區'); this.fridgeText.setColor('#6A1B9A');
            showFloatText.call(this, px, py - 30, '取出冰鎮奶酪', '#2196F3');
        }
    }
    // 5. 櫃台區 (裝盒打包給客人)
    else if (Phaser.Math.Distance.Between(px, py, this.stations.counter.x, this.stations.counter.y) < dist + 40) {
        if (heldState === 5 && isCustomerActive) {
            if (heldFlavor.id === currentOrder.id) {
                // 成功出餐
                score += currentOrder.price;
                this.scoreText.setText(`💰 營業額: $${score}`);
                heldState = 0; heldFlavor = null; updateHeldUI('雙手空空');
                
                isCustomerActive = false; customerNPC.setText('😍');
                showFloatText.call(this, customerNPC.x, customerNPC.y - 30, `裝盒打包! +$${currentOrder.price}`, '#4CAF50');
                this.time.delayedCall(1000, generateOrder, [], this);
            } else {
                showFloatText.call(this, px, py - 30, '客人點的不是這個口味喔！', '#F44336');
            }
        }
    }
}

function updateHeldUI(text) {
    this.heldText.setText(`🤲 狀態: ${text}`);
}

function generateOrder() {
    currentOrder = MENU[Math.floor(Math.random() * MENU.length)];
    customerNPC.setText('🧍').setVisible(true);
    orderBubble.setText(`${currentOrder.name}`).setVisible(true);
    timerBarBg.setVisible(true); timerBarFill.width = 80; timerBarFill.setVisible(true);
    customerTimer = CUSTOMER_MAX_TIME; isCustomerActive = true;
    customerNPC.y = 100;
    this.tweens.add({ targets: customerNPC, y: 60, duration: 300, ease: 'Bounce.easeOut' });
}

function handleDogCollision() {
    if (heldState !== 0) {
        heldState = 0; heldFlavor = null; updateHeldUI('雙手空空');
        showFloatText.call(this, player.x, player.y - 40, '💥 打翻了！重來！', '#F44336');
        player.body.setVelocity(dog.body.velocity.x * 3, dog.body.velocity.y * 3);
    }
}

function showFloatText(x, y, msg, color) {
    let t = this.add.text(x, y, msg, { fontSize: '20px', fill: color, fontStyle: 'bold' }).setOrigin(0.5);
    this.tweens.add({ targets: t, y: y - 50, alpha: 0, duration: 1500, onComplete: () => t.destroy() });
}
</script>

</body>
</html>
